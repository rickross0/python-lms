{% extends "base.html" %}
{% block title %}Welcome - Python LMS{% endblock %}
{% block content %}
<div class="card login-box text-center">
    <h1>📚 Python Learning Management System</h1>
    <p class="mb-2" style="color:#6b7280;">Master Python Step by Step! Track Progress • Earn Achievements • Get Certified 🏆</p>
    <div class="card" style="margin-top:20px;">
        <h2>🔑 Login</h2>
        <form method="POST" action="{{ url_for('login') }}">
            <input type="text" name="username" class="form-input" placeholder="Enter your username" required>
            <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
        </form>
    </div>
    <div class="card" style="margin-top:20px;">
        <h2>📝 Register</h2>
        <form method="POST" action="{{ url_for('register') }}">
            <input type="text" name="username" class="form-input" placeholder="Choose a username" required>
            <button type="submit" class="btn btn-success" style="width:100%;">Create Account</button>
        </form>
    </div>
</div>
{% endblock %}
